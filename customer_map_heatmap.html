<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Customer Map — Population & Income Overlay</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{
  --ink:#12110f; --cream:#f7f3ec; --gold:#c09a4a; --rust:#9b3a1e;
  --active:#2e7d52; --inactive:#9b3a1e; --panel:#faf6ef; --border:#e0d9cf; --muted:#7a7065;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Mono',monospace;background:var(--cream);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* HEADER */
header{background:var(--ink);padding:10px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:3px solid var(--gold);}
.logo{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--cream);letter-spacing:.03em;}
.logo span{color:var(--gold);}
.hdr-right{display:flex;gap:18px;align-items:center;}
.legend{display:flex;align-items:center;gap:6px;font-size:.62rem;color:#bbb;letter-spacing:.08em;text-transform:uppercase;}
.ldot{width:11px;height:11px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,.25);}
.ldot.active{background:#2e7d52;}
.ldot.inactive{background:#9b3a1e;}
.heat-legend{display:flex;align-items:center;gap:6px;font-size:.62rem;color:#bbb;letter-spacing:.06em;}
.heat-bar{width:80px;height:8px;border-radius:4px;background:linear-gradient(to right,#0d2b6e,#1565c0,#1e88e5,#26c6da,#66bb6a,#ffca28,#ff7043,#c62828);border:1px solid rgba(255,255,255,.15);}

/* STATUS */
#status-bar{background:var(--panel);border-bottom:1px solid var(--border);padding:6px 18px;display:flex;align-items:center;gap:10px;font-size:.66rem;color:var(--muted);flex-shrink:0;}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0;animation:blink 1.2s ease-in-out infinite;}
.pulse.done{background:var(--active);animation:none;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
#prog-wrap{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;max-width:260px;}
#prog-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--rust));width:0%;transition:width .3s ease;}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
#sidebar{width:270px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.sb-head{padding:10px 13px 8px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.sb-title{font-size:.63rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);}
.tabs{display:flex;gap:3px;}
.tab{font-family:'IBM Plex Mono',monospace;font-size:.6rem;padding:2px 7px;border:1px solid var(--border);background:transparent;cursor:pointer;border-radius:2px;color:var(--muted);}
.tab.on{background:var(--ink);color:var(--cream);border-color:var(--ink);}
.srch{padding:7px 10px;border-bottom:1px solid var(--border);}
.srch input{width:100%;background:#ede7dc;border:none;border-radius:2px;padding:5px 9px;font-family:'IBM Plex Mono',monospace;font-size:.67rem;color:var(--ink);outline:none;}
.srch input::placeholder{color:var(--muted);}

/* LAYER CONTROLS */
.layer-panel{padding:8px 13px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:5px;}
.layer-row{display:flex;align-items:center;justify-content:space-between;font-size:.63rem;color:var(--muted);}
.layer-row label{display:flex;align-items:center;gap:5px;cursor:pointer;}
input[type=range]{width:90px;height:3px;accent-color:var(--gold);cursor:pointer;}
input[type=checkbox]{accent-color:var(--ink);cursor:pointer;width:12px;height:12px;}
.layer-label{font-size:.6rem;text-transform:uppercase;letter-spacing:.09em;}

#cust-list{overflow-y:auto;flex:1;}
.c-item{padding:7px 13px;border-bottom:1px solid #ede7dc;cursor:pointer;display:flex;align-items:flex-start;gap:8px;transition:background .12s;}
.c-item:hover{background:#ede7dc;}
.c-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.c-dot.active{background:var(--active);}
.c-dot.inactive{background:var(--inactive);opacity:.7;}
.c-body{flex:1;min-width:0;}
.c-name{font-size:.68rem;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-loc{font-size:.59rem;color:var(--muted);margin-top:1px;}
.multi-badge{font-size:.56rem;background:#e8e0d5;color:var(--muted);padding:1px 4px;border-radius:2px;margin-left:3px;}

.stats-panel{border-top:1px solid var(--border);padding:8px 13px;display:grid;grid-template-columns:1fr 1fr;gap:5px 10px;flex-shrink:0;}
.stat-label{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.stat-val{font-size:.88rem;font-family:'Playfair Display',serif;color:var(--ink);}
.stat-val.g{color:var(--active);}
.stat-val.r{color:var(--inactive);}

/* MAP */
#map{flex:1;}

/* POPUPS */
.leaflet-popup-content-wrapper{background:var(--ink);color:var(--cream);border-radius:4px;font-family:'IBM Plex Mono',monospace;box-shadow:0 6px 24px rgba(0,0,0,.45);}
.leaflet-popup-tip{background:var(--ink);}
.leaflet-popup-content{margin:10px 14px;}
.pop-name{font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold);margin-bottom:3px;}
.pop-status{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}
.pop-status.a{color:#6fcf97;}
.pop-status.i{color:#eb7a60;}
.pop-addr{font-size:.63rem;color:#b0a898;line-height:1.5;}
.pop-date{font-size:.6rem;color:#7a7065;margin-top:4px;}
.pop-multi{font-size:.58rem;color:#8a8078;margin-top:2px;font-style:italic;}
</style>
</head>
<body>

<header>
  <div class="logo">Customer <span>Map</span> <span style="color:#666;font-size:.9rem;font-family:'IBM Plex Mono'">+ Pop / Income Overlay</span></div>
  <div class="hdr-right">
    <div class="heat-legend">
      <div class="heat-bar"></div>
      <span>Low → High Pop+Income</span>
    </div>
    <div class="legend"><div class="ldot active"></div>Active</div>
    <div class="legend"><div class="ldot inactive"></div>Inactive</div>
  </div>
</header>

<div id="status-bar">
  <div class="pulse" id="pulse"></div>
  <span id="status-text">Rendering heatmap…</span>
  <div id="prog-wrap"><div id="prog-bar"></div></div>
  <span id="cnt" style="white-space:nowrap;font-size:.64rem;color:var(--muted);">0 / 250 pins</span>
</div>

<div class="layout">
  <div id="sidebar">
    <div class="sb-head">
      <span class="sb-title">Customers</span>
      <div class="tabs">
        <button class="tab on" id="btn-all"      onclick="setFilter('all')">All</button>
        <button class="tab"    id="btn-active"   onclick="setFilter('active')">Active</button>
        <button class="tab"    id="btn-inactive" onclick="setFilter('inactive')">Inactive</button>
      </div>
    </div>

    <!-- Layer controls -->
    <div class="layer-panel">
      <div class="layer-row">
        <label><input type="checkbox" id="chk-heat" checked onchange="toggleHeat(this.checked)"/><span class="layer-label">Heatmap</span></label>
        <div style="display:flex;align-items:center;gap:5px;font-size:.6rem;">
          Opacity <input type="range" id="heat-opacity" min="0" max="100" value="72" oninput="setHeatOpacity(this.value/100)"/>
        </div>
      </div>
      <div class="layer-row">
        <label><input type="checkbox" id="chk-pins" checked onchange="togglePins(this.checked)"/><span class="layer-label">Customer Pins</span></label>
      </div>
    </div>

    <div class="srch"><input id="search" type="text" placeholder="Search…" oninput="filterList()"/></div>
    <div id="cust-list"></div>
    <div class="stats-panel">
      <div><div class="stat-label">Mapped</div><div class="stat-val" id="s-m">—</div></div>
      <div><div class="stat-label">Total</div><div class="stat-val" id="s-t">250</div></div>
      <div><div class="stat-label">Active</div><div class="stat-val g" id="s-a">—</div></div>
      <div><div class="stat-label">Inactive</div><div class="stat-val r" id="s-i">—</div></div>
    </div>
  </div>

  <div id="map"></div>
</div>

// ── MAP INIT ──────────────────────────────────────────────────────────────────
const map = L.map('map',{center:[38.5,-96],zoom:4,preferCanvas:true});

// Subtle grayscale base so heatmap pops
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19,opacity:.55
}).addTo(map);

// Label layer on top of heat but under pins
const labelLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png',{
  subdomains:'abcd',maxZoom:19,zIndex:500
}).addTo(map);

// ── HEATMAP LAYER ─────────────────────────────────────────────────────────────
let heatLayer = L.heatLayer(HEAT_PTS, {
  radius: 45,
  blur: 35,
  maxZoom: 6,
  max: 0.45,
  gradient: {
    0.00: '#0d2b6e',
    0.10: '#1565c0',
    0.22: '#1e88e5',
    0.35: '#26c6da',
    0.48: '#66bb6a',
    0.62: '#ffca28',
    0.78: '#ff7043',
    1.00: '#c62828'
  }
}).addTo(map);

// ── PIN ICONS ─────────────────────────────────────────────────────────────────
function mkIcon(color, ring='white', size=14){
  return L.divIcon({
    className:'',
    html:`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${size/2-1.5}" fill="${color}" stroke="${ring}" stroke-width="2"/>
    </svg>`,
    iconSize:[size,size],iconAnchor:[size/2,size/2],popupAnchor:[0,-size/2+2]
  });
}
const ICON_ACTIVE   = mkIcon('#2e7d52','white',15);
const ICON_INACTIVE = mkIcon('#c0392b','rgba(255,255,255,0.7)',13);

// ── STATE ─────────────────────────────────────────────────────────────────────
const recs = RAW.map((r,i)=>({...r,id:i,marker:null}));
let mapped=0, activeM=0, inactiveM=0;
let pinsVisible=true;
const pinGroup = L.layerGroup().addTo(map);

// multi-location index
const byName={};
RAW.forEach(r=>{byName[r.name]=(byName[r.name]||0)+1;});

// ── SIDEBAR BUILD ─────────────────────────────────────────────────────────────
const listEl=document.getElementById('cust-list');
const itemEls={};
const uniqueNames=[...new Set(RAW.map(r=>r.name))];

uniqueNames.forEach(name=>{
  const rs=recs.filter(r=>r.name===name);
  const isActive=rs.some(r=>r.active);
  const multi=rs.length>1;
  const k=name.replace(/[^a-z0-9]/gi,'_');
  const div=document.createElement('div');
  div.className='c-item'; div.dataset.name=name; div.dataset.active=isActive?'1':'0';
  div.innerHTML=`<div class="c-dot ${isActive?'active':'inactive'}" id="cd-${k}"></div>
    <div class="c-body">
      <div class="c-name">${name}${multi?`<span class="multi-badge">${rs.length}</span>`:''}</div>
      <div class="c-loc" id="cl-${k}">Locating…</div>
    </div>`;
  div.addEventListener('click',()=>{
    const ms=rs.map(r=>r.marker).filter(Boolean);
    if(ms.length===1){map.setView(ms[0].getLatLng(),13);ms[0].openPopup();}
    else if(ms.length>1){map.fitBounds(L.featureGroup(ms).getBounds().pad(.35));}
  });
  listEl.appendChild(div);
  itemEls[name]={dot:div.querySelector(`#cd-${k}`),loc:div.querySelector(`#cl-${k}`)};
});

// ── LAYER TOGGLES ─────────────────────────────────────────────────────────────
function toggleHeat(on){
  if(on) heatLayer.addTo(map); else map.removeLayer(heatLayer);
}
function setHeatOpacity(v){
  map.removeLayer(heatLayer);
  heatLayer = L.heatLayer(HEAT_PTS,{
    radius:45,blur:35,maxZoom:6,max:0.45,
    gradient:{'0.00':'#0d2b6e','0.10':'#1565c0','0.22':'#1e88e5','0.35':'#26c6da',
               '0.48':'#66bb6a','0.62':'#ffca28','0.78':'#ff7043','1.00':'#c62828'}
  });
  heatLayer._canvas && (heatLayer._canvas.style.opacity=v);
  if(document.getElementById('chk-heat').checked) heatLayer.addTo(map);
  heatLayer._container && (heatLayer._container.style.opacity=v);
}
function togglePins(on){
  pinsVisible=on;
  if(on) pinGroup.addTo(map); else map.removeLayer(pinGroup);
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats(){
  document.getElementById('s-m').textContent=mapped;
  document.getElementById('s-a').textContent=activeM;
  document.getElementById('s-i').textContent=inactiveM;
  document.getElementById('cnt').textContent=`${mapped} / ${RAW.length} pins`;
  document.getElementById('prog-bar').style.width=(mapped/RAW.length*100)+'%';
}

// ── FILTER ────────────────────────────────────────────────────────────────────
let activeFilter='all';
function setFilter(f){
  activeFilter=f;
  ['all','active','inactive'].forEach(x=>document.getElementById(`btn-${x}`).classList.toggle('on',x===f));
  filterList();
}
function filterList(){
  const q=document.getElementById('search').value.toLowerCase();
  [...listEl.children].forEach(el=>{
    const name=el.dataset.name||'';
    const ia=el.dataset.active==='1';
    const mf=activeFilter==='all'||(activeFilter==='active'&&ia)||(activeFilter==='inactive'&&!ia);
    el.style.display=(mf&&name.toLowerCase().includes(q))?'':'none';
  });
}

// ── ADD PIN ───────────────────────────────────────────────────────────────────
function addPin(rec,lat,lng){
  const j=(Math.random()-.5)*.006;
  const m=L.marker([lat+j,lng+j],{
    icon:rec.active?ICON_ACTIVE:ICON_INACTIVE,
    zIndexOffset:rec.active?200:0
  });
  const others=recs.filter(r=>r.name===rec.name&&r.id!==rec.id);
  const multiNote=others.length?`<div class="pop-multi">+ ${others.length} other location${others.length>1?'s':''}</div>`:'';
  m.bindPopup(`
    <div class="pop-name">${rec.name}</div>
    <div class="pop-status ${rec.active?'a':'i'}">${rec.active?'● Active':'○ Inactive'}</div>
    <div class="pop-addr">${rec.address}<br>${rec.city}, ${rec.state} ${rec.zip}</div>
    <div class="pop-date">${rec.last_order?'Last order: '+rec.last_order:'No order on record'}</div>
    ${multiNote}
  `,{maxWidth:230});
  m.addTo(pinGroup);
  rec.marker=m;
  // update sidebar
  const el=itemEls[rec.name];
  if(el){el.loc.textContent=`${rec.city}, ${rec.state}`;}
  mapped++; if(rec.active) activeM++; else inactiveM++;
  updateStats();
}

// ── GEOCODE via Nominatim (1 req per 200ms) ───────────────────────────────────
const cityCache={};
async function geocodeRec(rec){
  const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(rec.geocode_query+', USA')}&format=json&limit=1&countrycodes=us`;
  try{
    const r=await fetch(url,{headers:{'Accept-Language':'en'}});
    const d=await r.json();
    if(d&&d[0]) return{lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};
  }catch(e){}
  const k=`${rec.city}|${rec.state}`;
  if(cityCache[k]) return cityCache[k];
  try{
    const r2=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(rec.city+' '+rec.state+' USA')}&format=json&limit=1&countrycodes=us`,{headers:{'Accept-Language':'en'}});
    const d2=await r2.json();
    if(d2&&d2[0]){const pos={lat:parseFloat(d2[0].lat),lng:parseFloat(d2[0].lon)};cityCache[k]=pos;return pos;}
  }catch(e){}
  return null;
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
const pulse=document.getElementById('pulse'), statusText=document.getElementById('status-text');

async function run(){
  statusText.textContent='Heatmap rendered. Geocoding 250 customer addresses…';
  for(let i=0;i<recs.length;i++){
    const rec=recs[i];
    statusText.textContent=`Geocoding ${i+1}/${recs.length} — ${rec.name} (${rec.city}, ${rec.state})`;
    const pos=await geocodeRec(rec);
    if(pos) addPin(rec,pos.lat,pos.lng);
    else{
      mapped++;
      if(itemEls[rec.name]) itemEls[rec.name].loc.textContent='Not found';
      updateStats();
    }
    await new Promise(r=>setTimeout(r,210));
  }
  pulse.className='pulse done';
  statusText.textContent=`Done — ${mapped} locations · ${activeM} active (green) · ${inactiveM} inactive (red) · heatmap = high pop + high income`;
}

run();
</script>
